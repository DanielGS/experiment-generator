<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Generador experimentsConfig</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background: #f7f7f7;
    }
    .container {
      display: flex;
      gap: 32px;
      margin-bottom: 24px;
    }
    .input-block {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    label {
      font-weight: bold;
      margin-bottom: 8px;
    }
    textarea {
      width: 100%;
      min-height: 180px;
      resize: vertical;
      font-family: monospace;
      font-size: 15px;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #bbb;
      background: #fff;
    }
    button {
      padding: 10px 24px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      background: #007bff;
      color: #fff;
      cursor: pointer;
      margin-bottom: 24px;
      transition: background 0.2s;
    }
    button:hover {
      background: #0056b3;
    }
    .output-block {
      background: #222;
      color: #e0e0e0;
      padding: 18px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 15px;
      position: relative;
      margin-top: 12px;
      white-space: pre;
    }
    .copy-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      background: #444;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s;
    }
    .copy-btn:hover {
      background: #007bff;
    }
    .copied {
      background: #28a745 !important;
    }
  </style>
</head>
<body>
  <h1>experimentsConfig Generator</h1>
  <div class="container" style="flex-direction: column; gap: 0; margin-bottom: 0;">
    <details style="margin-bottom: 24px; background: #f0f0f0; border-radius: 8px; padding: 12px 18px; border: 1px solid #ccc;">
      <summary style="font-size: 17px; font-weight: bold; cursor: pointer; outline: none;">Advanced configuration</summary>
      <div style="display: flex; gap: 32px; margin-top: 18px;">
        <div class="input-block">
          <label for="experimentId">EXPERIMENT_ID</label>
          <input id="experimentId" type="text" value="20260326_category_pictures" style="font-family: monospace; font-size: 15px; padding: 8px; border-radius: 6px; border: 1px solid #bbb; background: #fff; width: 100%;" />
        </div>
        <div class="input-block">
          <label for="experimentKey">EXPERIMENT_KEY</label>
          <input id="experimentKey" type="text" value="exp_categorypictures_test" style="font-family: monospace; font-size: 15px; padding: 8px; border-radius: 6px; border: 1px solid #bbb; background: #fff; width: 100%;" />
        </div>
      </div>
      <div class="input-block" style="margin-top: 18px;">
        <label for="extraJson">Previous JSON Config (optional):</label>
        <textarea id="extraJson" placeholder='Example: {"categoryPage-extra": {"id": "...", ...}}' style="font-family: monospace; font-size: 15px; padding: 8px; border-radius: 6px; border: 1px solid #bbb; background: #fff; width: 100%; min-height: 80px;"></textarea>
        <span id="jsonErrorMsg" style="color: red; display: none; font-size: 14px; margin-top: 4px;"></span>
      </div>
    </details>
    <div style="display: flex; gap: 32px;">
      <div class="input-block">
        <label for="categories">Categories (one per line)</label>
        <textarea id="categories" placeholder="Example:\ncat1\ncat2\ncat3"></textarea>
      </div>
      <div class="input-block">
        <label for="testCategories">Test Categories (one per line, same order)</label>
        <textarea id="testCategories" placeholder="Example:\ntest1\ntest2\ntest3"></textarea>
      </div>
    </div>
  </div>
  <div style="display: flex; align-items: center; gap: 16px; margin-top: 16px;">
    <button id="generateBtn">Generate</button>
    <span id="lineErrorMsg" style="color: red; display: none; font-size: 15px;">The number of lines is not the same</span>
  </div>
  <div id="output"></div>
  <script>

    function generateExpeimentConfig(mainCategory, testCategory, experimentId, experimentKey) {
      return {
        ["categoryPage-" + mainCategory]: {
          id: experimentId,
          key: experimentKey,
          variants: {
            default: "categoryPage-" + mainCategory,
            v1: testCategory
          }
        }
      };
    }

    function generateExperimentsConfig(categories, testCategories, experimentId, experimentKey) {
      const result = {};
      for (let i = 0; i < categories.length; i++) {
        Object.assign(result, generateExpeimentConfig(categories[i], testCategories[i], experimentId, experimentKey));
      }
      return result;
    }

    function formatOutput(obj) {
      return JSON.stringify(obj, null, 2);
    }


    function getCleanLines(id) {
      return document.getElementById(id).value
        .split('\n')
        .map(s => s.trim())
        .filter(line => line.length > 0);
    }

    function getExtraJson() {
      const val = document.getElementById('extraJson').value.trim();
      if (!val) return null;
      try {
        const parsed = JSON.parse(val);
        return parsed;
      } catch (e) {
        return 'error';
      }
    }

    function cleanTextareaInput(e) {
      const lines = e.target.value.split('\n').map(s => s.trim()).filter(line => line.length > 0);
      const cleaned = lines.join('\n');
      if (e.target.value !== cleaned) {
        e.target.value = cleaned;
      }
    }

    function checkLinesAndToggleButton() {
      const categories = getCleanLines('categories');
      const testCategories = getCleanLines('testCategories');
      const btn = document.getElementById('generateBtn');
      const msg = document.getElementById('lineErrorMsg');
      const jsonMsg = document.getElementById('jsonErrorMsg');
      let jsonValid = true;
      const extra = document.getElementById('extraJson').value.trim();
      if (extra) {
        try {
          JSON.parse(extra);
          jsonMsg.style.display = 'none';
        } catch (e) {
          jsonMsg.textContent = 'Invalid JSON';
          jsonMsg.style.display = 'inline';
          jsonValid = false;
        }
      } else {
        jsonMsg.style.display = 'none';
      }
      if (categories.length !== testCategories.length || !jsonValid) {
        btn.disabled = true;
        if (categories.length !== testCategories.length) msg.style.display = 'inline';
      } else {
        btn.disabled = false;
        msg.style.display = 'none';
      }
    }


    document.getElementById('categories').addEventListener('input', function(e) {
      cleanTextareaInput(e);
      checkLinesAndToggleButton();
    });
    document.getElementById('testCategories').addEventListener('input', function(e) {
      cleanTextareaInput(e);
      checkLinesAndToggleButton();
    });
    document.getElementById('extraJson').addEventListener('input', checkLinesAndToggleButton);

    // Inicializar estado al cargar
    checkLinesAndToggleButton();

    document.getElementById('generateBtn').onclick = function() {
      const experimentId = document.getElementById('experimentId').value.trim();
      const experimentKey = document.getElementById('experimentKey').value.trim();
      const categories = getCleanLines('categories');
      const testCategories = getCleanLines('testCategories');
      const generated = generateExperimentsConfig(categories, testCategories, experimentId, experimentKey);
      const extra = getExtraJson();
      let config = {};
      // Primero las entries del extra JSON (en orden)
      if (extra && extra !== 'error') {
        if (Array.isArray(extra)) {
          extra.forEach(entry => {
            if (typeof entry === 'object' && entry !== null) {
              Object.keys(entry).forEach(key => {
                config[key] = entry[key];
              });
            }
          });
        } else if (typeof extra === 'object') {
          Object.keys(extra).forEach(key => {
            config[key] = extra[key];
          });
        }
      }
      // Luego las generadas por categorías (en orden)
      Object.keys(generated).forEach(key => {
        config[key] = generated[key];
      });
      const code = formatOutput(config);
      const codeMin = JSON.stringify(config);
      document.getElementById('output').innerHTML =
        '<div class="output-block" id="codeBlock">' +
        '<button class="copy-btn" id="copyBtn">Copy</button>' +
        '<pre style="margin:0;padding:0;background:none;border:none;"><code style="background:none;padding:0;">' +
        code.replace(/</g, '&lt;') +
        '</code></pre>' +
        '</div>';
      document.getElementById('copyBtn').onclick = function() {
        navigator.clipboard.writeText(codeMin).then(() => {
          this.classList.add('copied');
          this.textContent = 'Copied!';
          setTimeout(() => {
            this.classList.remove('copied');
            this.textContent = 'Copy';
          }, 1200);
        });
      };
    };
  </script>
</body>
</html>
